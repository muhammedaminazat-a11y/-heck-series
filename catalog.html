<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог сериалов – Hexlet Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Каталог сериалов для отслеживания просмотренных сезонов и серий."
  >
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="Image/logo.svg" alt="Логотип Hexlet Series" width="32" height="32">
        <span>Hexlet Series</span>
      </a>

      <button class="burger" id="burger" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link nav__link--active">Каталог</a>
        <a href="about.html" class="nav__link">О проекте</a>
        <a href="contact.html" class="nav__link">Контакты</a>
        <button class="header__cta header__cta--mobile">Профиль</button>
      </nav>

      <button class="header__cta header__cta--desktop">Профиль</button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <header class="section__header">
        <div>
          <h1 class="section__title">Каталог сериалов</h1>
          <p class="section__subtitle">
            Здесь можно показать 2–3 сериала для демонстрации работы сайта.
          </p>
        </div>
      </header>

      <div class="products">
        <article class="product-card">
          <div class="product-card__image">
            <img src="Series/Breaking_bad.jpg" alt="Breaking Bad">
            <div class="product-card__badge">Популярный</div>
          </div>
          <div class="product-card__body">
            <h3 class="product-card__title">Breaking Bad</h3>
            <div class="product-card__meta">
              <span>Сезон 2, серия 5</span>
              <span class="product-card__price">12 серий</span>
            </div>
            <button class="product-card__btn" onclick="markWatched(this)">Отметить</button>
          </div>
        </article>

        <article class="product-card">
          <div class="product-card__image">
            <img src="Series/dark.jpg" alt="Dark">
            <div class="product-card__badge">Топ</div>
          </div>
          <div class="product-card__body">
            <h3 class="product-card__title">Dark</h3>
            <div class="product-card__meta">
              <span>Сезон 1, серия 4</span>
              <span class="product-card__price">4 серии</span>
            </div>
            <button class="product-card__btn" onclick="markWatched(this)">Отметить</button>
          </div>
        </article>

        <article class="product-card">
          <div class="product-card__image">
            <img src="Series/the_witcher.jpg" alt="The Witcher">
            <div class="product-card__badge">Новинка</div>
          </div>
          <div class="product-card__body">
            <h3 class="product-card__title">The Witcher</h3>
            <div class="product-card__meta">
              <span>Сезон 2, серия 3</span>
              <span class="product-card__price">11 серий</span>
            </div>
            <button class="product-card__btn" onclick="markWatched(this)">Отметить</button>
          </div>
        </article>
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
